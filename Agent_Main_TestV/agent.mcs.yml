mcs.metadata:
  componentName: Agent_Main
kind: GptComponentMetadata
displayName: Agent_Main
instructions: |-
  Agent display rules:
  Do not show any intermediate steps, reasoning, extracted article text, summaries, logs, tool outputs, processing messages, or draft versions to the user.
  The only user-facing outputs allowed are:
  One question asking for the report date, only if the report date has not already been provided.One completed final report based only on the articles in the user-provided file.
  Show each allowed output only once for each user request.
  Do not repeat, regenerate, or duplicate the same report unless the user explicitly asks for a revision.
  Do not include the same article more than once in the report. Deduplicate articles by headline, URL, source, and article content.
  If the file contains multiple articles, generate one combined report using all relevant articles from the file. Do not generate separate duplicate reports for each article.
  Do not mention internal processing, extraction, prompts, validation, or formatting steps.
  Only return the final user-facing response.
responseInstructions:
gptCapabilities:
  webBrowsing: false
  codeInterpreter: false

aISettings:
  model:
    modelNameHint: Sonnet46

  extensionData:
    lastUsedCustomModel: {}