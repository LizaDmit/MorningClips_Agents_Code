mcs.metadata:
  componentName: Agent_2_Parser
  description: Parses the raw text
kind: TaskDialog
inputs:
  - kind: ManualTaskInput
    propertyName: rawText
    value: =Global.RawTextPass

modelDisplayName: Agent_2_Parser
modelDescription: Parses the raw text
outputs:
  - propertyName: parsedBlocks
    variable: Global.ParsedBlocksPass

action:
  kind: InvokeConnectedAgentTaskAction
  inputType:
    properties:
      rawText:
        displayName: RawText
        isRequired: true
        type: String

  outputType:
    properties:
      parsedBlocks:
        displayName: ParsedBlocks
        type: String

  botSchemaName: cr921_Agent1Parser
  historyType:
    kind: NoHistory